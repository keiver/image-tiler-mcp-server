name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: github.event.pull_request.merged == true && (contains(github.event.pull_request.labels.*.name, 'version:patch') || contains(github.event.pull_request.labels.*.name, 'version:minor') || contains(github.event.pull_request.labels.*.name, 'version:major'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: npm ci
      - run: npm test

      - name: Determine version bump
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            let bump = 'patch';
            if (labels.includes('version:major')) bump = 'major';
            else if (labels.includes('version:minor')) bump = 'minor';
            core.setOutput('bump', bump);
            core.info(`Version bump: ${bump}`);

      - name: Bump version
        id: bump
        run: |
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $VERSION"

      - name: Update CHANGELOG
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          HEADING=$(printf '%s%s' '#' '#')
          printf "\n%s [%s] - %s\n- %s (#%s)\n\n" "$HEADING" "$NEW_VERSION" "$TODAY" "$PR_TITLE" "$PR_NUMBER" > /tmp/changelog_entry.txt
          awk '!inserted && /^## \[[0-9]/ {system("cat /tmp/changelog_entry.txt"); inserted=1} 1 END { if (!inserted) system("cat /tmp/changelog_entry.txt") }' CHANGELOG.md > /tmp/changelog_new.md
          mv /tmp/changelog_new.md CHANGELOG.md

      - run: npm run build

      - name: Commit and push
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Extract changelog for release
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const version = process.env.NEW_VERSION;
          const startMarker = `## [${version}]`;
          const start = changelog.indexOf(startMarker);
          if (start === -1) { console.error(`"## [${version}]" not found in CHANGELOG.md; the changelog update step may have failed`); process.exit(1); }
          const nextSection = changelog.indexOf('\n## [', start + 1);
          const content = changelog.substring(start, nextSection > 0 ? nextSection : changelog.length).trim();
          fs.writeFileSync('release-notes.md', content);
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.bump.outputs.version }}';
            const body = [
              `🚀 Released as [v${version}](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${version})`,
              `📦 [npm](https://www.npmjs.com/package/image-tiler-mcp-server/v/${version})`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
